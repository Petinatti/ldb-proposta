<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luiza & Vitor — LDB Filmes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #000;
  --dim: #0A0A0A;
  --text: #F0EDE6;
  --muted: #6B6660;
  --line: rgba(240,237,230,0.12);
}
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--black);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

.intro {
  position: fixed;
  inset: 0;
  background: var(--black);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  transition: opacity 1.5s ease, visibility 1.5s;
  overflow: hidden;
}
.intro.fade-out {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.intro-video {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}
.intro-video iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 177.78vh;
  min-width: 100%;
  height: 56.25vw;
  min-height: 100%;
  transform: translate(-50%, -50%);
  border: none;
}
.intro-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.45) 50%, rgba(0,0,0,0.75) 100%);
  z-index: 2;
}

.intro-content {
  position: relative;
  z-index: 3;
  opacity: 0;
  transform: translateY(20px);
  animation: introIn 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
}
@keyframes introIn {
  to { opacity: 1; transform: translateY(0); }
}

.intro-logo {
  font-family: 'Cormorant Garamond', serif;
  color: var(--text);
  font-size: 20px;
  margin-bottom: 60px;
  opacity: 0.5;
  letter-spacing: 0.05em;
}
.intro-logo .bold { font-weight: 700; }
.intro-logo .thin { font-family: 'Inter', sans-serif; font-weight: 200; font-size: 11px; margin-left: 3px; letter-spacing: 0.1em; }

.intro-eyebrow {
  font-size: 11px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: rgba(240,237,230,0.45);
  margin-bottom: 32px;
}
.intro-names {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(56px, 11vw, 140px);
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.025em;
  margin-bottom: 28px;
}
.intro-names em { font-style: italic; color: rgba(240,237,230,0.5); font-weight: 200; }
.intro-date {
  font-size: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(240,237,230,0.55);
  margin-bottom: 80px;
}
.intro-start {
  background: transparent;
  border: 1px solid rgba(240,237,230,0.3);
  color: var(--text);
  padding: 18px 42px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s, color 0.3s, letter-spacing 0.3s;
}
.intro-start:hover {
  background: var(--text);
  color: var(--black);
  border-color: var(--text);
  letter-spacing: 0.4em;
}

.cinema {
  position: fixed;
  inset: 0;
  background: var(--black);
  display: flex;
  flex-direction: column;
  opacity: 0;
  visibility: hidden;
  transition: opacity 1.5s ease, visibility 1.5s;
}
.cinema.active {
  opacity: 1;
  visibility: visible;
}

.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 24px 32px 30px;
  z-index: 10;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
  transition: opacity 0.4s;
  pointer-events: none;
}
.top-bar.hidden { opacity: 0; }
.top-bar > * { pointer-events: auto; }

.top-bar-left { justify-self: start; }
.top-logo {
  justify-self: center;
  font-family: 'Cormorant Garamond', serif;
  color: rgba(240,237,230,0.85);
  font-size: 16px;
  padding-left: 0;
}
.top-logo .bold { font-weight: 700; }
.top-logo .thin { font-family: 'Inter', sans-serif; font-weight: 200; font-size: 10px; margin-left: 2px; letter-spacing: 0.1em; }

.now-playing {
  justify-self: end;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(240,237,230,0.55);
}
.now-playing strong {
  color: var(--text);
  font-weight: 400;
  margin-left: 14px;
}

.player-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 90px 60px 240px;
  min-height: 0;
}
.player {
  width: auto;
  height: 100%;
  max-width: 100%;
  max-height: calc(100vh - 360px);
  aspect-ratio: 16/9;
  background: #050505;
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
  transition: opacity 0.5s;
}
.player.changing { opacity: 0; }
.player iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

.chapters {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 70%, transparent 100%);
  padding: 40px 32px 30px;
  z-index: 10;
  transition: opacity 0.4s;
}
.chapters.hidden { opacity: 0; }
.chapters-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.chapters-action {
  max-width: 1100px;
  margin: 18px auto 0;
  display: flex;
  justify-content: center;
}

.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--text);
  color: var(--black);
  border: none;
  padding: 14px 32px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s, letter-spacing 0.2s;
}
.download-btn:hover {
  opacity: 0.88;
  letter-spacing: 0.24em;
}
.download-btn svg {
  width: 13px;
  height: 13px;
}
.download-btn span {
  font-weight: 400;
  opacity: 0.7;
  margin-left: 2px;
}
.chapter-btn {
  background: transparent;
  border: 1px solid rgba(240,237,230,0.15);
  color: var(--text);
  padding: 16px 18px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.25s, background 0.25s;
  font-family: 'Inter', sans-serif;
}
.chapter-btn:hover {
  border-color: rgba(240,237,230,0.4);
  background: rgba(240,237,230,0.04);
}
.chapter-btn.active {
  border-color: var(--text);
  background: rgba(240,237,230,0.06);
}
.chapter-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-style: italic;
  color: rgba(240,237,230,0.55);
  margin-bottom: 4px;
}
.chapter-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
  letter-spacing: 0.02em;
  margin-bottom: 2px;
}
.chapter-time {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240,237,230,0.4);
}

.exit-btn {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(240,237,230,0.2);
  color: rgba(240,237,230,0.8);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  padding: 8px 14px;
  transition: color 0.2s, background 0.2s, border-color 0.2s;
  backdrop-filter: blur(8px);
}
.exit-btn:hover {
  color: white;
  background: rgba(0,0,0,0.7);
  border-color: rgba(240,237,230,0.5);
}

@media (max-width: 900px) {
  .top-bar { padding: 14px 16px 24px; grid-template-columns: 1fr auto 1fr; }
  .top-logo { font-size: 14px; }
  .now-playing { display: none; }
  .player-wrap { padding: 80px 16px 300px; }
  .player { max-height: calc(100vh - 380px); }
  .chapters { padding: 20px 16px 24px; }
  .chapters-inner { grid-template-columns: 1fr 1fr; gap: 10px; }
  .chapter-btn { padding: 12px 14px; }
}

@media (max-width: 540px) {
  .chapters-inner { grid-template-columns: 1fr; }
  .player-wrap { padding: 80px 12px 360px; }
  .player { max-height: calc(100vh - 440px); }
  .now-playing { display: none; }
}
</style>
</head>
<body>

<div class="intro" id="intro">
  <div class="intro-video">
    <iframe src="https://player.vimeo.com/video/1190561146?background=1&autoplay=1&loop=1&muted=1&autopause=0" frameborder="0" allow="autoplay; fullscreen"></iframe>
  </div>
  <div class="intro-overlay"></div>
  <div class="intro-content">
    <div class="intro-logo"><span class="bold">LDB</span><span class="thin">FILMES</span></div>
    <div class="intro-eyebrow">Apresenta</div>
    <h1 class="intro-names">Luiza <em>&amp;</em> Vitor</h1>
    <div class="intro-date"></div>
    <button class="intro-start" onclick="entrarCinema()">Começar a sessão</button>
  </div>
</div>

<div class="cinema" id="cinema">

  <div class="top-bar" id="topBar">
    <div class="top-bar-left">
      <button class="exit-btn" onclick="sairCinema()">← Saída</button>
    </div>
    <div class="top-logo"><span class="bold">LDB</span><span class="thin">FILMES</span></div>
    <div class="now-playing">Reproduzindo <strong id="nowPlaying"></strong></div>
  </div>

  <div class="player-wrap">
    <div class="player" id="player">
      <iframe id="playerFrame" src="" allow="autoplay; fullscreen; picture-in-picture; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <div class="chapters" id="chapters">
    <div class="chapters-inner">
      <button class="chapter-btn active" data-idx="0" onclick="trocarVideo(0)">
        <div class="chapter-num">Capítulo I</div>
        <div class="chapter-name">O primeiro olhar</div>
        <div class="chapter-time">Teaser</div>
      </button>
      <button class="chapter-btn" data-idx="1" onclick="trocarVideo(1)">
        <div class="chapter-num">Capítulo II</div>
        <div class="chapter-name">A história completa</div>
        <div class="chapter-time">Film</div>
      </button>
    </div>
    <div class="chapters-action">
      <a class="download-btn" id="downloadBtn" href="#" target="_blank">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 1v9M3 7l4 4 4-4M2 13h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Baixar <span id="downloadLabel">este capítulo</span>
      </a>
    </div>
  </div>

</div>

<script>
var videos = [
  { id: '1190561146', label: 'O primeiro olhar', download: 'https://vimeo.com/1190561146' },
  { id: '1196356526', label: 'A história completa', download: 'https://vimeo.com/1196356526' },
];

var atual = 0;

function entrarCinema(){
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function(){
    document.getElementById('cinema').classList.add('active');
    trocarVideo(0);
  }, 800);
}

function sairCinema(){
  document.getElementById('playerFrame').src = '';
  document.getElementById('cinema').classList.remove('active');
  setTimeout(function(){
    document.getElementById('intro').classList.remove('fade-out');
  }, 600);
}

function trocarVideo(idx){
  atual = idx;
  var v = videos[idx];
  var player = document.getElementById('player');
  player.classList.add('changing');
  setTimeout(function(){
    document.getElementById('playerFrame').src = 'https://player.vimeo.com/video/' + v.id + '?autoplay=1&title=0&byline=0&portrait=0';
    document.getElementById('nowPlaying').textContent = v.label;
    document.getElementById('downloadBtn').href = v.download;
    document.getElementById('downloadLabel').textContent = v.label.toLowerCase();
    document.querySelectorAll('.chapter-btn').forEach(function(b){ b.classList.remove('active'); });
    document.querySelector('.chapter-btn[data-idx="' + idx + '"]').classList.add('active');
    player.classList.remove('changing');
  }, 400);
}

var hideTimeout;
function resetHide(){
  clearTimeout(hideTimeout);
  document.getElementById('topBar').classList.remove('hidden');
  document.getElementById('chapters').classList.remove('hidden');
  hideTimeout = setTimeout(function(){
    document.getElementById('topBar').classList.add('hidden');
    document.getElementById('chapters').classList.add('hidden');
  }, 4000);
}
document.addEventListener('mousemove', resetHide);
document.addEventListener('touchstart', resetHide);
resetHide();
</script>
</body>
</html>
